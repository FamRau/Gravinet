<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="35%" cy="25%" r="75%">
      <stop offset="0%" stop-color="#1e2333"/>
      <stop offset="100%" stop-color="#0f1117"/>
    </radialGradient>
    <radialGradient id="center" cx="38%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#6fa8ff"/>
      <stop offset="100%" stop-color="#2a5ecc"/>
    </radialGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="96" fill="url(#bg)" stroke="rgba(255,255,255,0.28)" stroke-width="8"/>

  <!-- Connection lines -->
  <line x1="256" y1="256" x2="138" y2="152" stroke="#4f8ef7" stroke-width="9" stroke-opacity="0.3" stroke-linecap="round"/>
  <line x1="256" y1="256" x2="374" y2="152" stroke="#4f8ef7" stroke-width="9" stroke-opacity="0.3" stroke-linecap="round"/>
  <line x1="256" y1="256" x2="138" y2="370" stroke="#4f8ef7" stroke-width="9" stroke-opacity="0.3" stroke-linecap="round"/>
  <line x1="256" y1="256" x2="374" y2="370" stroke="#4f8ef7" stroke-width="9" stroke-opacity="0.3" stroke-linecap="round"/>

  <!-- Satellite nodes -->
  <circle cx="138" cy="152" r="40" fill="#181c27" stroke="#4f8ef7" stroke-width="2.5" stroke-opacity="0.6"/>
  <circle cx="374" cy="152" r="40" fill="#181c27" stroke="#4f8ef7" stroke-width="2.5" stroke-opacity="0.6"/>
  <circle cx="138" cy="370" r="40" fill="#181c27" stroke="#4f8ef7" stroke-width="2.5" stroke-opacity="0.6"/>
  <circle cx="374" cy="370" r="40" fill="#181c27" stroke="#4f8ef7" stroke-width="2.5" stroke-opacity="0.6"/>

  <!-- Satellite inner dots -->
  <circle cx="138" cy="152" r="17" fill="#4f8ef7" fill-opacity="0.75"/>
  <circle cx="374" cy="152" r="17" fill="#4f8ef7" fill-opacity="0.75"/>
  <circle cx="138" cy="370" r="17" fill="#4f8ef7" fill-opacity="0.75"/>
  <circle cx="374" cy="370" r="17" fill="#4f8ef7" fill-opacity="0.75"/>

  <!-- Central hub with glow -->
  <circle cx="256" cy="256" r="78" fill="url(#center)" filter="url(#glow)"/>
  <circle cx="256" cy="256" r="66" fill="url(#center)"/>
</svg>
